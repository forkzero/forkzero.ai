<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="hsl(220,40%,10%)"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="hsl(220,40%,15%)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="hsl(180,100%,50%)"/>
  <!-- Hexagon mark -->
  <polygon points="600,180 640,203 640,249 600,272 560,249 560,203" fill="none" stroke="hsl(180,100%,50%)" stroke-width="2.5"/>
  <polygon points="600,195 625,210 625,240 600,255 575,240 575,210" fill="hsl(180,100%,50%)" opacity="0.15"/>
  <!-- LATTICE text -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="700" letter-spacing="8" fill="hsl(220,80%,95%)">LATTICE</text>
  <!-- Tagline -->
  <text x="600" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="400" fill="hsl(220,20%,60%)">Knowledge Graph for AI-Native Teams</text>
  <!-- URL -->
  <text x="600" y="540" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" fill="hsl(180,100%,50%)" opacity="0.7">forkzero.ai</text>
  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="hsl(180,100%,50%)"/>
</svg>
