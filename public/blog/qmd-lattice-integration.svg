<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="720" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(220,40%,10%)"/>
      <stop offset="100%" stop-color="hsl(220,40%,14%)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" rx="12" fill="url(#bgGrad)"/>

  <!-- Top node: .lattice/ -->
  <rect x="260" y="30" width="200" height="44" rx="8" fill="hsl(220,40%,18%)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="360" y="57" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="600" fill="hsl(220,80%,95%)">.lattice/ (YAML in Git)</text>

  <!-- Branching lines from top -->
  <line x1="310" y1="74" x2="180" y2="120" stroke="hsl(180,100%,50%)" stroke-width="1.5" opacity="0.5"/>
  <line x1="410" y1="74" x2="540" y2="120" stroke="hsl(258,90%,66%)" stroke-width="1.5" opacity="0.5"/>

  <!-- Left branch: lattice search -->
  <rect x="80" y="120" width="200" height="40" rx="8" fill="hsl(180,100%,50%)" fill-opacity="0.12" stroke="hsl(180,100%,50%)" stroke-width="1"/>
  <text x="180" y="145" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="hsl(180,100%,50%)">lattice search</text>
  <text x="180" y="175" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(232,240,254,0.55)">(structured)</text>

  <!-- Right branch: qmd collection -->
  <rect x="440" y="120" width="200" height="40" rx="8" fill="hsl(258,90%,66%)" fill-opacity="0.12" stroke="hsl(258,90%,66%)" stroke-width="1"/>
  <text x="540" y="145" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="600" fill="hsl(258,90%,66%)">qmd collection</text>
  <text x="540" y="175" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(232,240,254,0.55)">(semantic)</text>

  <!-- Left sub-branches -->
  <line x1="140" y1="160" x2="110" y2="210" stroke="hsl(180,100%,50%)" stroke-width="1" opacity="0.4"/>
  <line x1="220" y1="160" x2="250" y2="210" stroke="hsl(180,100%,50%)" stroke-width="1" opacity="0.4"/>

  <!-- Left sub-node 1: by ID/metadata -->
  <rect x="30" y="210" width="160" height="52" rx="6" fill="hsl(220,40%,14%)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="110" y="233" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500" fill="hsl(220,80%,95%)">by ID / metadata</text>
  <text x="110" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.55)">exact match</text>

  <!-- Left sub-node 2: graph proximity -->
  <rect x="200" y="210" width="160" height="52" rx="6" fill="hsl(220,40%,14%)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="280" y="233" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500" fill="hsl(220,80%,95%)">graph proximity</text>
  <text x="280" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.55)">--related-to</text>

  <!-- Right sub-node: BM25 + Vector + Re-rank -->
  <rect x="440" y="210" width="200" height="52" rx="6" fill="hsl(220,40%,14%)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="540" y="233" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500" fill="hsl(220,80%,95%)">BM25 + Vector + Re-rank</text>
  <text x="540" y="250" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.55)">fuzzy / conceptual</text>

  <!-- Lines to MCP nodes -->
  <line x1="110" y1="262" x2="180" y2="310" stroke="hsl(180,100%,50%)" stroke-width="1" opacity="0.4"/>
  <line x1="280" y1="262" x2="180" y2="310" stroke="hsl(180,100%,50%)" stroke-width="1" opacity="0.4"/>
  <line x1="540" y1="262" x2="540" y2="310" stroke="hsl(258,90%,66%)" stroke-width="1" opacity="0.4"/>

  <!-- Left MCP node -->
  <rect x="100" y="310" width="160" height="40" rx="8" fill="hsl(180,100%,50%)" fill-opacity="0.08" stroke="hsl(180,100%,50%)" stroke-width="1" stroke-opacity="0.6"/>
  <text x="180" y="335" text-anchor="middle" font-family="'SF Mono',Monaco,Consolas,monospace" font-size="12" font-weight="500" fill="hsl(180,100%,50%)">lattice MCP</text>

  <!-- Right MCP node -->
  <rect x="460" y="310" width="160" height="40" rx="8" fill="hsl(258,90%,66%)" fill-opacity="0.08" stroke="hsl(258,90%,66%)" stroke-width="1" stroke-opacity="0.6"/>
  <text x="540" y="335" text-anchor="middle" font-family="'SF Mono',Monaco,Consolas,monospace" font-size="12" font-weight="500" fill="hsl(258,90%,66%)">qmd MCP</text>

  <!-- Lines to agent -->
  <line x1="180" y1="350" x2="310" y2="400" stroke="hsl(180,100%,50%)" stroke-width="1.5" opacity="0.4"/>
  <line x1="540" y1="350" x2="410" y2="400" stroke="hsl(258,90%,66%)" stroke-width="1.5" opacity="0.4"/>

  <!-- Bottom node: AI Agent -->
  <rect x="260" y="396" width="200" height="50" rx="10" fill="hsl(160,84%,39%)" fill-opacity="0.15" stroke="hsl(160,84%,39%)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="360" y="418" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="700" fill="hsl(160,84%,39%)">AI Agent</text>
  <text x="360" y="436" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.55)">(structured + semantic)</text>
</svg>
