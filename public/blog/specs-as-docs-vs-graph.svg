<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" fill="none">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="720" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(220,40%,10%)"/>
      <stop offset="100%" stop-color="hsl(220,40%,14%)"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" rx="12" fill="url(#bgGrad2)"/>

  <!-- Center divider -->
  <line x1="360" y1="50" x2="360" y2="430" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- LEFT HEADER -->
  <text x="180" y="40" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="700" fill="hsl(220,80%,95%)">Specs as Documents</text>
  <text x="180" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(232,240,254,0.55)">Spec Kit · Kiro · OpenSpec</text>

  <!-- LEFT: three disconnected spec docs -->
  <rect x="80" y="100" width="200" height="48" rx="6" fill="hsl(220,40%,16%)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="180" y="124" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="hsl(220,80%,95%)">spec.md</text>
  <text x="180" y="140" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.5)">requirement</text>

  <rect x="80" y="180" width="200" height="48" rx="6" fill="hsl(220,40%,16%)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="180" y="204" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="hsl(220,80%,95%)">spec.md</text>
  <text x="180" y="220" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.5)">requirement</text>

  <rect x="80" y="260" width="200" height="48" rx="6" fill="hsl(220,40%,16%)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="180" y="284" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="hsl(220,80%,95%)">spec.md</text>
  <text x="180" y="300" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.5)">requirement</text>

  <!-- LEFT: three "?" indicators on the right of each doc -->
  <text x="310" y="130" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="700" fill="rgba(255,180,90,0.7)">?</text>
  <text x="310" y="210" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="700" fill="rgba(255,180,90,0.7)">?</text>
  <text x="310" y="290" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" font-weight="700" fill="rgba(255,180,90,0.7)">?</text>

  <!-- LEFT footer: missing answers -->
  <text x="180" y="365" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(232,240,254,0.55)">No link to evidence</text>
  <text x="180" y="385" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(232,240,254,0.55)">No version on edges</text>
  <text x="180" y="405" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(232,240,254,0.55)">No drift detection</text>

  <!-- RIGHT HEADER -->
  <text x="540" y="40" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="700" fill="hsl(180,100%,50%)">Specs as a Graph</text>
  <text x="540" y="60" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(232,240,254,0.55)">Lattice · versioned edges</text>

  <!-- RIGHT: source -->
  <rect x="440" y="90" width="200" height="44" rx="6" fill="hsl(220,40%,16%)" stroke="hsl(180,100%,50%)" stroke-width="1" stroke-opacity="0.5"/>
  <text x="540" y="112" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="hsl(180,100%,50%)">SRC-RESEARCH-001</text>
  <text x="540" y="127" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.55)">source</text>

  <!-- Edge with version -->
  <line x1="540" y1="134" x2="540" y2="158" stroke="hsl(180,100%,50%)" stroke-width="1.5" opacity="0.6"/>
  <text x="558" y="150" font-family="ui-monospace,monospace" font-size="9" fill="hsl(180,100%,50%)" opacity="0.85">v1.2.0</text>

  <!-- Thesis -->
  <rect x="440" y="158" width="200" height="44" rx="6" fill="hsl(220,40%,16%)" stroke="hsl(180,100%,50%)" stroke-width="1" stroke-opacity="0.5"/>
  <text x="540" y="180" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="hsl(180,100%,50%)">THX-PRICING</text>
  <text x="540" y="195" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.55)">thesis</text>

  <!-- Edge with version + drift indicator -->
  <line x1="540" y1="202" x2="540" y2="226" stroke="hsl(38,90%,55%)" stroke-width="1.5" opacity="0.85"/>
  <text x="558" y="218" font-family="ui-monospace,monospace" font-size="9" fill="hsl(38,90%,55%)">v1.0.0 ⚠</text>

  <!-- Requirement -->
  <rect x="440" y="226" width="200" height="44" rx="6" fill="hsl(220,40%,16%)" stroke="hsl(180,100%,50%)" stroke-width="1" stroke-opacity="0.5"/>
  <text x="540" y="248" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="hsl(180,100%,50%)">REQ-BILLING-014</text>
  <text x="540" y="263" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.55)">requirement</text>

  <!-- Edge with version -->
  <line x1="540" y1="270" x2="540" y2="294" stroke="hsl(180,100%,50%)" stroke-width="1.5" opacity="0.6"/>
  <text x="558" y="286" font-family="ui-monospace,monospace" font-size="9" fill="hsl(180,100%,50%)" opacity="0.85">v1.1.0</text>

  <!-- Implementation -->
  <rect x="440" y="294" width="200" height="44" rx="6" fill="hsl(160,84%,39%)" fill-opacity="0.15" stroke="hsl(160,84%,39%)" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="540" y="316" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="700" fill="hsl(160,84%,39%)">IMP-BILLING-FLOW</text>
  <text x="540" y="331" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="rgba(232,240,254,0.55)">implementation</text>

  <!-- RIGHT footer: drift annotation -->
  <text x="540" y="365" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(232,240,254,0.55)">Every edge versioned</text>
  <text x="540" y="385" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="rgba(232,240,254,0.55)">Drift flagged automatically</text>
  <text x="540" y="405" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="hsl(38,90%,55%)" opacity="0.85">⚠ thesis drifted — review needed</text>
</svg>
